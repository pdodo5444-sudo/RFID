<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID 智慧點名系統 - by 黃信芙</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MQTT.js CDN -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #1e293b);
            min-height: 100vh;
            color: #f1f5f9;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(74, 222, 128, 0); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0); }
        }
        .online-glow {
            animation: pulse-green 2s infinite;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">
                    RFID 智慧點名系統
                </h1>
                <p class="text-slate-400 mt-2 flex items-center gap-2">
                    <span class="px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 text-sm border border-blue-500/20">v2.4 (Local CSV Mode)</span>
                    <span class="font-medium text-slate-300 ml-2">by 黃信芙</span>
                </p>
            </div>
            
            <div class="flex flex-wrap items-center gap-3">
                <div id="mqtt-status" class="flex items-center gap-2 px-4 py-2 rounded-full bg-red-500/10 text-red-400 text-xs font-bold border border-red-500/20">
                    <div class="w-2 h-2 rounded-full bg-red-500"></div>
                    MQTT 嘗試連線中...
                </div>

                <button onclick="toggleTTS()" id="tts-btn" class="glass-card px-5 py-2 flex items-center gap-2 hover:bg-white/10 transition-all active:scale-95">
                    <i data-lucide="volume-2" class="w-4 h-4"></i>
                    <span>語音已開啟</span>
                </button>

                <button onclick="exportCSV()" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-blue-900/20 active:scale-95">
                    <i data-lucide="file-down" class="w-4 h-4"></i>
                    <span>匯出 CSV</span>
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6">
                <p class="text-slate-400 text-sm mb-4">應到人數</p>
                <p id="stat-total" class="text-4xl font-bold">0</p>
            </div>
            <div class="glass-card p-6 border-l-4 border-l-emerald-500">
                <p class="text-slate-400 text-sm mb-4">實到人數</p>
                <p id="stat-present" class="text-4xl font-bold text-emerald-400">0</p>
            </div>
            <div class="glass-card p-6 border-l-4 border-l-rose-500">
                <p class="text-slate-400 text-sm mb-4">缺席人數</p>
                <p id="stat-absent" class="text-4xl font-bold text-rose-400">0</p>
            </div>
            <div class="glass-card p-6">
                <div class="flex justify-between mb-2">
                    <p class="text-slate-400 text-sm">出席率</p>
                    <p id="stat-rate" class="text-xl font-bold text-cyan-400">0%</p>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-3 mt-4">
                    <div id="rate-bar" class="bg-gradient-to-r from-cyan-500 to-blue-500 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-xl font-bold">學生名單</h2>
                    <input type="text" id="search-input" placeholder="搜尋姓名或學號..." 
                        class="bg-slate-800/50 border border-slate-700 rounded-xl py-2 px-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                </div>
                <div class="glass-card overflow-hidden">
                    <div class="overflow-x-auto max-h-[550px] custom-scrollbar">
                        <table class="w-full text-left">
                            <thead class="sticky top-0 bg-slate-900 z-10">
                                <tr>
                                    <th class="p-5 text-xs font-bold text-slate-400 uppercase">學號</th>
                                    <th class="p-5 text-xs font-bold text-slate-400 uppercase">姓名</th>
                                    <th class="p-5 text-xs font-bold text-slate-400 uppercase">RFID</th>
                                    <th class="p-5 text-xs font-bold text-slate-400 uppercase">狀態</th>
                                    <th class="p-5 text-xs font-bold text-slate-400 uppercase text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="student-table-body" class="divide-y divide-slate-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <h2 class="text-xl font-bold">即時動態</h2>
                <div class="glass-card p-4 h-[600px] flex flex-col">
                    <div id="activity-log" class="flex-1 overflow-y-auto custom-scrollbar space-y-2 text-sm font-mono"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            // 已更新為你的本地檔案名稱
            CSV_URL: '121171075.csv',
            MQTT_TOPIC: 'justRollCall',
            PRIMARY_BROKER: 'wss://broker.emqx.io:8084/mqtt',
            FALLBACK_BROKER: 'wss://broker.emqx.io/mqtt' 
        };

        let students = [];
        let isTTSEnabled = true;
        let mqttClient = null;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'ok') { osc.frequency.setValueAtTime(880, audioCtx.currentTime); }
            else { osc.frequency.setValueAtTime(220, audioCtx.currentTime); }
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function speak(text) {
            if (!isTTSEnabled) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            window.speechSynthesis.speak(u);
        }

        function toggleTTS() {
            isTTSEnabled = !isTTSEnabled;
            document.getElementById('tts-btn').querySelector('span').innerText = isTTSEnabled ? '語音已開啟' : '語音已關閉';
            addLog(`語音功能已${isTTSEnabled ? '開啟' : '關閉'}`);
        }

        async function fetchStudents() {
            try {
                // 嘗試抓取與 HTML 同目錄下的 CSV 檔案
                const res = await fetch(CONFIG.CSV_URL);
                if (!res.ok) throw new Error('找不到 CSV 檔案');
                
                const text = await res.text();
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
                
                students = lines.slice(1).map(l => {
                    const [tag, id, name] = l.split(',').map(s => s.trim());
                    return { tag, id, name, isPresent: false, time: null };
                });
                
                renderTable();
                updateStats();
                addLog(`成功讀取本地名單: ${CONFIG.CSV_URL}`);
            } catch (e) { 
                addLog(`名單載入失敗: 請確保 ${CONFIG.CSV_URL} 與網頁放在同一個資料夾`, 'error'); 
            }
        }

        function initMQTT(brokerUrl = CONFIG.PRIMARY_BROKER) {
            addLog(`嘗試連線: ${brokerUrl}...`);
            const clientId = 'canvas_' + Math.random().toString(16).slice(2, 10);
            
            try {
                mqttClient = mqtt.connect(brokerUrl, { 
                    clientId, 
                    path: '/mqtt',
                    connectTimeout: 5000 
                });

                mqttClient.on('connect', () => {
                    const st = document.getElementById('mqtt-status');
                    st.className = "flex items-center gap-2 px-4 py-2 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-bold border border-emerald-500/20 online-glow";
                    st.innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-500"></div>MQTT 已連線`;
                    mqttClient.subscribe(CONFIG.MQTT_TOPIC);
                    addLog("MQTT 連線成功！");
                });

                mqttClient.on('message', (t, m) => {
                    const tag = m.toString().trim();
                    const s = students.find(x => x.tag === tag);
                    if (!s) {
                        addLog(`未知標籤: ${tag}`, 'error');
                        playSfx('err');
                        speak("未知標籤");
                    } else if (s.isPresent) {
                        addLog(`${s.name} 重複感應`);
                        speak(`${s.name}重複點名`);
                    } else {
                        s.isPresent = true;
                        s.time = new Date().toLocaleTimeString();
                        addLog(`${s.name} 點名成功`, 'success');
                        playSfx('ok');
                        speak(`${s.name}點名成功`);
                        renderTable();
                        updateStats();
                    }
                });

                mqttClient.on('error', (err) => {
                    console.error('MQTT Error:', err);
                    if (brokerUrl === CONFIG.PRIMARY_BROKER) {
                        addLog("主線路失敗，嘗試切換備援埠口...", 'error');
                        mqttClient.end();
                        initMQTT(CONFIG.FALLBACK_BROKER);
                    } else {
                        addLog("連線失敗，請下載檔案至本地或 GitHub 執行。", 'error');
                    }
                });

            } catch (e) {
                addLog("初始化 MQTT 失敗", 'error');
            }
        }

        function toggleManual(id) {
            const s = students.find(x => x.id === id);
            if (s) {
                s.isPresent = !s.isPresent;
                s.time = s.isPresent ? new Date().toLocaleTimeString() : null;
                renderTable(); updateStats();
                addLog(`手動操作: ${s.name}`);
            }
        }

        function updateStats() {
            const p = students.filter(x => x.isPresent).length;
            const total = students.length;
            const r = total > 0 ? Math.round((p / total) * 100) : 0;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-present').innerText = p;
            document.getElementById('stat-absent').innerText = total - p;
            document.getElementById('stat-rate').innerText = r + '%';
            document.getElementById('rate-bar').style.width = r + '%';
        }

        function renderTable() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const body = document.getElementById('student-table-body');
            body.innerHTML = students.filter(s => s.name.toLowerCase().includes(q) || s.id.toLowerCase().includes(q)).map(s => `
                <tr class="hover:bg-white/5 transition-colors">
                    <td class="p-5 font-mono text-sm">${s.id}</td>
                    <td class="p-5 font-bold">${s.name}</td>
                    <td class="p-5 text-xs text-slate-500">${s.tag}</td>
                    <td class="p-5">
                        <span class="${s.isPresent ? 'text-emerald-400 font-bold' : 'text-slate-500'} text-sm">
                            ${s.isPresent ? '● 已出席 (' + s.time + ')' : '○ 未到'}
                        </span>
                    </td>
                    <td class="p-5 text-center">
                        <button onclick="toggleManual('${s.id}')" class="text-xs border border-slate-700 px-3 py-1 rounded hover:bg-slate-700 transition-colors">
                            ${s.isPresent ? '取消' : '補點'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function addLog(msg, type = 'info') {
            const log = document.getElementById('activity-log');
            const d = document.createElement('div');
            const color = type === 'success' ? 'text-emerald-400 font-bold' : (type === 'error' ? 'text-rose-400' : 'text-slate-400');
            d.className = "flex gap-2";
            d.innerHTML = `<span class="text-slate-600">[${new Date().toLocaleTimeString()}]</span> <span class="${color}">${msg}</span>`;
            log.prepend(d);
        }

        function exportCSV() {
            let csv = "\ufeff學號,姓名,狀態,點名時間\n";
            students.forEach(s => csv += `${s.id},${s.name},${s.isPresent ? '出席' : '缺席'},${s.time || '-'}\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `點名紀錄_${new Date().getTime()}.csv`;
            a.click();
        }

        document.getElementById('search-input').addEventListener('input', renderTable);
        window.onload = () => { lucide.createIcons(); fetchStudents(); initMQTT(); };
    </script>
</body>
</html>
